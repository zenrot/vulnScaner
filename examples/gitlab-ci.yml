# GitLab CI — AI SAST Scan with MR comment
#
# Prerequisites:
#   1. Deploy the SAST agent server (see docker-compose.yml).
#   2. Set CI/CD variables in GitLab (Settings → CI/CD → Variables):
#      - SAST_SERVER_URL  — e.g. http://sast.internal:10000  (masked)
#      - SAST_BOT_TOKEN   — GitLab personal/project access token with api scope (masked)
#
# Include in your .gitlab-ci.yml:
#   include:
#     - local: examples/gitlab-ci.yml
#
# Or copy the job below directly into your pipeline.

sast-scan:
  stage: test
  image: alpine:3.20
  before_script:
    - apk add --no-cache curl jq git
  script:
    # 1. Archive source code (exclude .git and vendor)
    - |
      tar -czf /tmp/source.tar.gz \
        --exclude='.git' \
        --exclude='vendor' \
        .

    # 2. Send archive to SAST server
    - |
      HTTP_CODE=$(curl -sS -w "%{http_code}" -o scan-response.json \
        -X POST "${SAST_SERVER_URL}/scan" \
        -F "archive=@/tmp/source.tar.gz" \
        -F "provider=ollama-agentic" \
        -F "ai_budget=10" \
        -F "fail_on_severity=HIGH" \
        -F "fail_on_verdict=true_positive" \
        -F "correlation_id=gitlab-${CI_PIPELINE_ID}")

      if [ "$HTTP_CODE" -ne 200 ]; then
        echo "SAST server returned HTTP $HTTP_CODE:"
        cat scan-response.json
        exit 1
      fi

      echo "Scan result:"
      jq '{should_fail, stats: .report.stats}' scan-response.json

    # 3. Post comment to MR (skipped if not a merge request)
    - |
      if [ -z "${CI_MERGE_REQUEST_IID}" ] || [ -z "${SAST_BOT_TOKEN}" ]; then
        echo "Not a merge request or SAST_BOT_TOKEN not set — skipping comment"
      else
        COMMENT_BODY=$(sh scripts/format-mr-comment.sh scan-response.json)

        # Find existing bot comment to update, or create new one
        EXISTING_ID=$(curl -sS \
          -H "PRIVATE-TOKEN: ${SAST_BOT_TOKEN}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes?per_page=100" \
          | jq -r '[.[] | select(.body | contains("<!-- sast-bot -->"))] | first | .id // empty')

        PAYLOAD=$(jq -n --arg body "$COMMENT_BODY" '{"body": $body}')

        if [ -n "$EXISTING_ID" ]; then
          curl -sS -X PUT \
            -H "PRIVATE-TOKEN: ${SAST_BOT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes/${EXISTING_ID}" \
            > /dev/null
          echo "Updated existing MR comment (note id: ${EXISTING_ID})"
        else
          curl -sS -X POST \
            -H "PRIVATE-TOKEN: ${SAST_BOT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes" \
            > /dev/null
          echo "Created new MR comment"
        fi
      fi

    # 4. Fail the pipeline if security gate triggered
    - |
      if jq -e '.should_fail == true' scan-response.json > /dev/null; then
        echo "❌ Security gate failed — critical vulnerabilities detected"
        exit 1
      fi
      echo "✅ Security gate passed"

  artifacts:
    when: always
    paths:
      - scan-response.json
    expire_in: 14 days

  rules:
    # Run on merge requests
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    # Run on pushes to default branch
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
