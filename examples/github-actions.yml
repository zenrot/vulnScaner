name: SAST Scan

on:
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  sast:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Archive source code
        run: |
          tar -czf /tmp/source.tar.gz \
            --exclude='.git' \
            --exclude='vendor' \
            .

      - name: Run SAST scan
        env:
          SAST_SERVER_URL: ${{ secrets.SAST_SERVER_URL }}
        run: |
          HTTP_CODE=$(curl -sS -w "%{http_code}" -o scan-response.json \
            -X POST "${SAST_SERVER_URL}/scan" \
            -F "archive=@/tmp/source.tar.gz" \
            -F "provider=ollama-agentic" \
            -F "ai_budget=10" \
            -F "fail_on_severity=HIGH" \
            -F "fail_on_verdict=true_positive" \
            -F "correlation_id=gha-${{ github.run_id }}")

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "SAST server returned HTTP $HTTP_CODE:"
            cat scan-response.json
            exit 1
          fi
          jq '{should_fail, stats: .report.stats}' scan-response.json

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let data;
            try {
              data = JSON.parse(fs.readFileSync('scan-response.json', 'utf8'));
            } catch (e) {
              core.warning('scan-response.json not found or invalid — skipping comment');
              return;
            }

            const report  = data.report  || {};
            const stats   = report.stats || {};
            const metrics = report.scan_metrics || {};
            const findings = report.findings || [];

            const status  = data.should_fail ? '🔴 FAIL' : '🟢 PASS';
            const sevIcon = { CRITICAL: '🔴', HIGH: '🔴', MEDIUM: '🟡', LOW: '🔵' };

            let body = `## 🔒 Отчёт SAST\n\n`;
            body += `<!-- sast-bot -->\n\n`;
            body += `| | |\n|---|---|\n`;
            body += `| **Статус** | ${status} |\n`;
            body += `| **Файлов просканировано** | ${metrics.files_scanned || 0} |\n`;
            body += `| **Всего находок** | ${stats.total_findings || 0} |\n`;
            body += `| **Проверено** | ${stats.ai_triaged_findings || 0} |\n`;
            body += `| **Реальные** | ${stats.true_positive_count || 0} |\n`;
            body += `| **На проверку** | ${stats.needs_review_count || 0} |\n`;
            body += `| **Ложные** | ${stats.false_positive_count || 0} |\n\n`;

            const actionable = findings.filter(
              i => i.verdict?.label === 'true_positive' || i.verdict?.label === 'needs_review'
            );

            if (actionable.length > 0) {
              body += `### Находки\n\n`;
              for (const item of actionable.slice(0, 20)) {
                const f = item.finding || {};
                const v = item.verdict  || {};
                const icon = sevIcon[f.severity] || '⚪';
                const file = (f.file || '').split('/').pop();
                body += `<details>\n`;
                body += `<summary>${icon} ${f.severity} · ${v.label} · ${f.title || f.rule_id} (${file}:${f.line || '?'})</summary>\n\n`;
                if (f.evidence)    body += `**Свидетельство:** \`${f.evidence}\`\n\n`;
                if (v.rationale)   body += `**Вердикт:** ${v.rationale}\n\n`;
                if (v.remediation) body += `**Исправление:** ${v.remediation}\n\n`;
                if (item.snippet)  body += `\`\`\`go\n${item.snippet}\n\`\`\`\n\n`;
                body += `</details>\n`;
              }
              if (actionable.length > 20) {
                body += `\n*…и ещё ${actionable.length - 20} находок. Смотри артефакты сборки.*\n`;
              }
            } else {
              body += `Уязвимостей, требующих внимания, не обнаружено.\n`;
            }

            body += `\n---\n*Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('<!-- sast-bot -->'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing comment #${existing.id}`);
            } else {
              const { data: created } = await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.info(`Created comment #${created.id}`);
            }

      - name: Upload scan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-report
          path: scan-response.json
          retention-days: 14

      - name: Security gate
        run: |
          if jq -e '.should_fail == true' scan-response.json > /dev/null; then
            echo "❌ Security gate FAILED"
            exit 1
          fi
          echo "✅ Security gate passed"
