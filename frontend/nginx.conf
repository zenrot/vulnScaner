upstream api {
    server vulnscanner-api:8080;
}

server {
    listen 80;
    client_max_body_size 100m;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # CI endpoint — regular proxying with response buffering.
    location = /scan {
        proxy_pass              http://api/scan;
        proxy_read_timeout      1800s;
        proxy_send_timeout       60s;
        proxy_request_buffering off;
        proxy_http_version      1.1;
    }

    # Web UI endpoint — SSE stream, buffering must be off.
    location = /scan/stream {
        proxy_pass              http://api/scan/stream;
        proxy_read_timeout      1800s;
        proxy_send_timeout      1800s;
        proxy_request_buffering off;
        proxy_buffering         off;
        proxy_http_version      1.1;
        proxy_set_header        Connection '';
        chunked_transfer_encoding on;
    }

    location = /healthz {
        proxy_pass http://api/healthz;
    }

    location /jobs/ {
        proxy_pass              http://api/jobs/;
        proxy_read_timeout      1800s;
        proxy_send_timeout      1800s;
        proxy_request_buffering off;
        proxy_buffering         off;
        proxy_http_version      1.1;
        proxy_set_header        Connection '';
        chunked_transfer_encoding on;
    }

    location /history {
        proxy_pass         http://api/history;
        proxy_http_version 1.1;
    }

    location = /provider/test {
        proxy_pass              http://api/provider/test;
        proxy_read_timeout      60s;
        proxy_request_buffering off;
        proxy_http_version      1.1;
    }
}
